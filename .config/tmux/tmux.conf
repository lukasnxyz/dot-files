# tmux config

# --- status bar
#set -g status-style bg="#282828",fg="#808080"
#set -g window-status-current-style bg="#282828",fg="#ffdd33"
set -g status-style bg="default",fg="#808080"
set -g window-status-current-style bg="default",fg="#ffdd33"
set -g window-status-current-format "#I:#W"
set -g window-status-format "#I:#W"

setw -g pane-border-style fg="#2d2d2d"
setw -g pane-active-border-style fg="#f0e68c"

set -g status-left ""
set -g status-right "[#S]"
set -g base-index 1
set -g pane-base-index 1

# --- keybindings
set -g mode-keys vi

bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux configuration file reloaded"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key H resize-pane -L 10
bind-key J resize-pane -D 10
bind-key K resize-pane -U 10
bind-key L resize-pane -R 10

bind-key "|" split-window -h -c "#{pane_current_path}"  # horizontal split, same dir
bind-key "-" split-window -v -c "#{pane_current_path}"  # vertical split, same dir
unbind '"'

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'
set -s copy-command 'wl-copy'

# new windows are right next to current window
bind c new-window -a
bind R move-window -r

# toggle status bar
bind-key b set-option status

# --- plugins (direct load)
# auto-save and auto-restore sessions
set -g @continuum-restore "on"
set -g @continuum-save-interval "5"
set -g @resurrect-capture-pane-contents "on"

# load plugins directly
if-shell '[ -f ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux ]' \
  "run-shell '~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux'"
if-shell '[ -f ~/.config/tmux/plugins/tmux-continuum/continuum.tmux ]' \
  "run-shell '~/.config/tmux/plugins/tmux-continuum/continuum.tmux'"
